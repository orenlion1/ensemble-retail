name: Account Baseline Guard

on:
  pull_request:
    paths:
      - "infra/terraform/stacks/account-baseline/**"
      - "scripts/terraform/guarded-apply-account-baseline.sh"
      - ".github/workflows/account-baseline-guard.yml"
  push:
    branches: [main, master]
    paths:
      - "infra/terraform/stacks/account-baseline/**"
      - "scripts/terraform/guarded-apply-account-baseline.sh"
      - ".github/workflows/account-baseline-guard.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  guard:
    name: Guard account-baseline changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure guarded script checks account identity
        run: |
          grep -q "aws sts get-caller-identity" "scripts/terraform/guarded-apply-account-baseline.sh"
          grep -q "EXPECTED_AWS_ACCOUNT_ID" "scripts/terraform/guarded-apply-account-baseline.sh"
          grep -q "CONFIRM_ACCOUNT_BASELINE_APPLY" "scripts/terraform/guarded-apply-account-baseline.sh"

      - name: Validate Terraform account-baseline stack
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform init and validate
        run: |
          terraform -chdir=infra/terraform/stacks/account-baseline init -backend=false
          terraform -chdir=infra/terraform/stacks/account-baseline validate

  apply:
    name: Apply account-baseline (manual approval required)
    if: github.event_name == 'workflow_dispatch'
    needs: guard
    runs-on: ubuntu-latest
    environment:
      name: account-baseline-prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.ACCOUNT_BASELINE_APPLY_ROLE_ARN }}

      - name: Guarded apply
        env:
          CONFIRM_ACCOUNT_BASELINE_APPLY: "yes"
          AWS_REGION: "us-east-1"
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" && "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "Refusing apply. workflow_dispatch apply is limited to main/master."
            exit 1
          fi
          scripts/terraform/guarded-apply-account-baseline.sh

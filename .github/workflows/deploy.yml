name: Deploy

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: deploy-ensemble-retail
  cancel-in-progress: false

jobs:
  changes:
    name: Detect changed components
    # Only consider the exact commit that just passed Build on main.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      services: ${{ steps.filter.outputs.services }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Check out the CI-tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Diff against the last deployed commit
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Base = head of the most recent successful Deploy run. Diffing a
          # range (base..head) instead of HEAD^ keeps multi-commit pushes and
          # skipped docs-only deploys accounted for. No base -> deploy all.
          base="$(gh run list --workflow Deploy --status success --branch main --limit 1             --json headSha --jq '.[0].headSha // empty')"
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "No usable previous deploy base; deploying everything."
            changed="__ALL__"
          else
            changed="$(git diff --name-only "$base" "$HEAD_SHA")"
            echo "Changed files since $base:"; echo "$changed"
          fi
          services='[]'; frontend=false
          if [ "$changed" = "__ALL__" ] || echo "$changed" | grep -q '^\.github/workflows/deploy\.yml$'; then
            services='["inventory-service","cart-service","account-service"]'
            frontend=true
          else
            svcs=""
            for s in inventory-service cart-service account-service; do
              if echo "$changed" | grep -q "^services/$s/"; then
                svcs="$svcs\"$s\","
              fi
            done
            services="[${svcs%,}]"
            echo "$changed" | grep -q '^frontend/' && frontend=true
          fi
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "Will deploy services=$services frontend=$frontend"

  backend:
    name: Backend (${{ matrix.service }})
    needs: changes
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    env:
      AWS_REGION: us-east-1
      NAMESPACE: ensemble-grafana
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Check out the CI-tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_SHA }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Package Spring Boot service
        working-directory: services/${{ matrix.service }}
        run: mvn -B -ntp package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build and push image
        id: image
        run: |
          registry="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          tag="${HEAD_SHA:0:7}"
          image="$registry/${{ matrix.service }}:$tag"
          jar="$(ls services/${{ matrix.service }}/target/*.jar | grep -v '\.original$' | head -n 1)"
          jar_rel="target/$(basename "$jar")"
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$registry" >/dev/null
          docker build --platform linux/amd64 \
            --build-arg "JAR_FILE=$jar_rel" \
            -t "$image" \
            -f "services/${{ matrix.service }}/Dockerfile" \
            "services/${{ matrix.service }}"
          docker push "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Roll out deployment
        run: |
          kubectl -n "$NAMESPACE" set image "deployment/${{ matrix.service }}" \
            "${{ matrix.service }}=${{ steps.image.outputs.image }}"
          kubectl -n "$NAMESPACE" rollout status "deployment/${{ matrix.service }}" --timeout=300s

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      AWS_REGION: us-east-1
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Check out the CI-tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_SHA }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build storefront
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync frontend/dist "s3://${{ secrets.FRONTEND_BUCKET }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*" >/dev/null
          echo "Invalidation submitted for /*"

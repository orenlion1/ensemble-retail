name: Observability Apply

# Guarded, manual-only path for applying the two Alloy ConfigMaps out of infra/k8s/alloy-beyla.yaml
# (see infra/terraform/stacks/ci-observability-apply). This workflow never runs automatically and
# never applies without a human first reviewing the diff: the "apply" job only runs when
# explicitly requested via the `apply` input AND only after the "observability-apply" GitHub
# environment's required reviewers approve it. The AWS IAM role it applies with only grants
# eks:DescribeCluster (enough for `aws eks update-kubeconfig`) -- real authorization comes from
# Kubernetes RBAC (infra/k8s/observability-apply-rbac.yaml), scoped to just the
# alloy-config/pyroscope-alloy-config ConfigMaps and the alloy Deployment/pyroscope-alloy
# DaemonSet in the ensemble-observability namespace. It cannot touch anything else in the
# cluster -- the Namespace, ClusterRole, ClusterRoleBinding, Beyla DaemonSet, services, network
# policies, and ingress remain operator-applied only via scripts/kubernetes/apply-manifests.sh.
#
# One-time setup: scripts/terraform/bootstrap-ci-observability-apply.sh (see
# infra/terraform/stacks/README.md section 11).
on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply after diff. Leave false to only diff and review."
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: observability-apply
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  YQ_VERSION: v4.44.3
  CONFIGMAPS_PATH: /tmp/observability-configmaps.yaml

jobs:
  plan:
    name: Diff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        run: |
          curl -sL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Extract the alloy-config/pyroscope-alloy-config ConfigMaps
        run: |
          yq eval-all \
            'select(.kind == "ConfigMap" and (.metadata.name == "alloy-config" or .metadata.name == "pyroscope-alloy-config"))' \
            infra/k8s/alloy-beyla.yaml > "$CONFIGMAPS_PATH"
          echo "Extracted objects:"
          yq eval-all '.metadata.name' "$CONFIGMAPS_PATH"

      - name: Configure AWS credentials (read-only plan role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OBSERVABILITY_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER_NAME }}" --region "$AWS_REGION"

      - name: kubectl diff
        run: |
          set +e
          kubectl diff -f "$CONFIGMAPS_PATH" > /tmp/diff.txt 2>&1
          diff_exit=$?
          set -e
          cat /tmp/diff.txt
          # kubectl diff exits 1 when a diff exists (expected) and >1 on a real error.
          if [ "$diff_exit" -gt 1 ]; then
            echo "::error::kubectl diff failed"
            exit 1
          fi
          {
            echo "### Observability apply: kubectl diff"
            echo '```diff'
            cat /tmp/diff.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload extracted ConfigMaps artifact
        uses: actions/upload-artifact@v4
        with:
          name: observability-configmaps
          path: ${{ env.CONFIGMAPS_PATH }}
          retention-days: 5

  apply:
    name: Apply
    needs: plan
    if: ${{ inputs.apply }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Required reviewers on this environment are the actual approval gate: the apply IAM role's
    # trust policy only allows AssumeRoleWithWebIdentity from jobs running under this exact
    # environment, so the role literally cannot be assumed until a reviewer approves this job.
    environment: observability-apply
    steps:
      - name: Download extracted ConfigMaps artifact
        uses: actions/download-artifact@v4
        with:
          name: observability-configmaps
          path: /tmp

      - name: Configure AWS credentials (scoped apply role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.OBSERVABILITY_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ secrets.EKS_CLUSTER_NAME }}" --region "$AWS_REGION"

      - name: kubectl apply
        id: apply
        run: |
          out="$(kubectl apply -f "$CONFIGMAPS_PATH")"
          echo "$out"
          alloy_changed=false; pyroscope_changed=false
          echo "$out" | grep -qE '^configmap/alloy-config (configured|created)' && alloy_changed=true
          echo "$out" | grep -qE '^configmap/pyroscope-alloy-config (configured|created)' && pyroscope_changed=true
          echo "alloy_changed=$alloy_changed" >> "$GITHUB_OUTPUT"
          echo "pyroscope_changed=$pyroscope_changed" >> "$GITHUB_OUTPUT"

      - name: Roll alloy (config changed)
        if: steps.apply.outputs.alloy_changed == 'true'
        run: |
          kubectl -n ensemble-observability rollout restart deployment/alloy
          kubectl -n ensemble-observability rollout status deployment/alloy --timeout=120s

      - name: Roll pyroscope-alloy (config changed)
        if: steps.apply.outputs.pyroscope_changed == 'true'
        run: |
          kubectl -n ensemble-observability rollout restart daemonset/pyroscope-alloy
          kubectl -n ensemble-observability rollout status daemonset/pyroscope-alloy --timeout=120s

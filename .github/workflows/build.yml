name: Build

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Predeploy security checks
        run: bash scripts/security/predeploy-check.sh

  backend:
    name: Backend (${{ matrix.service }})
    needs: security
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [inventory-service, cart-service, account-service]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Package Spring Boot service
        working-directory: services/${{ matrix.service }}
        run: mvn -B -ntp package -DskipTests

  frontend:
    name: Frontend
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Build storefront
        working-directory: frontend
        run: npm run build
      - name: Playwright frontend behavior checks
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: Inspect k6 frontend and regional scripts
        run: |
          k6 inspect load-tests/ensemble-retail.js
          k6 inspect load-tests/synthetic-browser-actions.js
          k6 inspect load-tests/grafana-cloud-20-user-regional.js
          k6 inspect load-tests/grafana-cloud-traffic-spikes.js
          k6 inspect load-tests/grafana-cloud-traffic-spikes-2.js

  observability:
    name: Observability checks
    needs: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Verify scripted synthetic check manifest is in sync
        run: node observability/synthetic-monitoring/sync-scripted-check.mjs --check
      - name: Verify browser action synthetic check manifest is in sync
        run: node observability/synthetic-monitoring/sync-browser-action-check.mjs --check
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: Inspect scripted synthetic check script
        run: k6 inspect observability/synthetic-monitoring/ensemble-retail-scripted-check.js
      - name: Inspect browser action synthetic check script
        run: k6 inspect observability/synthetic-monitoring/ensemble-retail-browser-action-check.js

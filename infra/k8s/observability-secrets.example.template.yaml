apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-secrets
  namespace: ensemble-observability
type: Opaque
stringData:
  GRAFANA_CLOUD_OTLP_ENDPOINT: https://otlp-gateway-prod-us-east-3.grafana.net/otlp
  GRAFANA_CLOUD_PROFILES_URL: https://profiles-prod-028.grafana.net
  GRAFANA_CLOUD_INSTANCE_ID: replace-me
  GRAFANA_CLOUD_API_KEY: replace-me
  # Honeycomb Ingest API key (x-honeycomb-team). Create one at Environment > API Keys > Ingest.
  HONEYCOMB_INGEST_API_KEY: replace-me

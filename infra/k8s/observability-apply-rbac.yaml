# RBAC for the guarded "Observability Apply" GitHub Actions workflow's OIDC roles
# (ensemble-grafana-observability-plan / -apply, see
# infra/terraform/stacks/ci-observability-apply). The roles are mapped to the
# ensemble-observability-planners / ensemble-observability-appliers groups in the kube-system
# aws-auth ConfigMap (operator-managed, see scripts/terraform/bootstrap-ci-observability-apply.sh).
# The applier may only read/patch the two Alloy ConfigMaps and restart the alloy Deployment /
# pyroscope-alloy DaemonSet in this namespace -- it cannot touch the Namespace, ClusterRole,
# ClusterRoleBinding, or Beyla DaemonSet also defined in infra/k8s/alloy-beyla.yaml, which remain
# operator-applied only via scripts/kubernetes/apply-manifests.sh.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ensemble-observability-planner
  namespace: ensemble-observability
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["alloy-config", "pyroscope-alloy-config"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["alloy"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    resourceNames: ["pyroscope-alloy"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ensemble-observability-planner
  namespace: ensemble-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ensemble-observability-planner
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: ensemble-observability-planners
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ensemble-observability-applier
  namespace: ensemble-observability
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["alloy-config", "pyroscope-alloy-config"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["alloy"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    resourceNames: ["pyroscope-alloy"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ensemble-observability-applier
  namespace: ensemble-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ensemble-observability-applier
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: ensemble-observability-appliers

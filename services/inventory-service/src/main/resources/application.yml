server:
  port: 8081
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
spring:
  application:
    name: inventory-service
  cache:
    cache-names: inventory-products,inventory-categories
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
logging:
  level:
    root: ${LOG_LEVEL:INFO}
ensemble:
  security:
    allowed-origins: ${ALLOWED_CORS_ORIGINS:http://localhost:5173}
  dynamodb:
    products-table: ${PRODUCTS_TABLE:ensemble-products}
    endpoint: ${DYNAMODB_ENDPOINT:}

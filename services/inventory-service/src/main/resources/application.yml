server:
  port: 8081
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
spring:
  application:
    name: inventory-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/ensemble_inventory}
    username: ${POSTGRES_USER:ensemble}
    password: ${POSTGRES_PASSWORD:ensemble}
  sql:
    init:
      mode: always
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
logging:
  level:
    root: ${LOG_LEVEL:INFO}
ensemble:
  security:
    allowed-origins: ${ALLOWED_CORS_ORIGINS:http://localhost:5173}

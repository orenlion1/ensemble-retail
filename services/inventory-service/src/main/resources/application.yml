server:
  port: 8081
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
spring:
  application:
    name: inventory-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/ensemble_inventory}
    username: ${POSTGRES_USER:ensemble}
    password: ${POSTGRES_PASSWORD:ensemble}
    hikari:
      maximum-pool-size: ${POSTGRES_MAX_POOL_SIZE:4}
      minimum-idle: ${POSTGRES_MIN_IDLE:1}
      connection-timeout: ${POSTGRES_CONNECTION_TIMEOUT_MS:5000}
  sql:
    init:
      mode: always
  cache:
    cache-names: inventory-products,inventory-categories
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState
        liveness:
          include: livenessState
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
logging:
  level:
    root: ${LOG_LEVEL:INFO}
ensemble:
  security:
    allowed-origins: ${ALLOWED_CORS_ORIGINS:http://localhost:5173}
